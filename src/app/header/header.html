<header class="header" [class.scrolled]="isScrolled">
  <div class="container">
    <button class="burger" (click)="toggleMenu()" [class.active]="isMenuOpen">
      <span></span><span></span><span></span>
    </button>

    <div routerLink="/home" class="logo">
      <img src="https://everrest.educata.dev/logo.png" alt="Logo">
      <p>EverREST</p>
    </div>

    <div class="nav-content" [class.open]="isMenuOpen">
      <div class="search-container">
        <div class="search-box">
          <input type="text" placeholder="Search...">
          <div class="search-filters">
            <span class="divider"></span>
            <button class="filter-btn"> <i class="chevron"></i></button>
          </div>
          <button class="search-submit">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
        </div>
      </div>

      <nav class="main-nav">
        <ul>
          <li routerLinkActive="active" routerLink="/home">home<i></i></li>
          <li routerLinkActive="active" routerLink="/products">products<i></i></li>
          <li routerLinkActive="active" routerLink="qrcode">Qr Codes</li>
        </ul>
      </nav>
    </div>

    @if (seeSign) {
      <div class="actions">
        <button class="btn-primary" routerLink="/sign-in" routerLinkActive="activeRoute">Sign in</button>
      </div>
    } @else {
      <div class="actions" routerLink="/profile">
        <span class="btn-primary"><i class="fa-regular fa-2x fa-user"></i></span>
      </div>
    }
  </div>
</header>
